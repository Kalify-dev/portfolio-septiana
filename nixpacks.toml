[phases.setup]
nixPkgs = ["php84", "php84Extensions.intl", "php84Extensions.pdo_mysql", "php84Extensions.mbstring", "php84Extensions.zip", "php84Extensions.gd", "php84Extensions.curl", "php84Extensions.tokenizer", "php84Extensions.xml"]

[phases.install]
cmds = ["composer install --optimize-autoloader --no-scripts --no-interaction --ignore-platform-reqs"]

[phases.build]
cmds = [
    "npm install",
    "npm run build",
    "mkdir -p storage/framework/{sessions,views,cache}",
    "mkdir -p storage/app/public/livewire-tmp",
    "mkdir -p storage/app/private/livewire-tmp",
    "mkdir -p storage/app/livewire-tmp",
    "mkdir -p bootstrap/cache",
    "chmod -R 777 storage bootstrap/cache",
    "php artisan migrate --force",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]

[start]
cmd = "rm -rf public/storage && php artisan storage:link --force && php artisan serve --host 0.0.0.0 --port $PORT"
