[phases.build]
cmds = [
    "mkdir -p storage/framework/{sessions,views,cache}",
    "mkdir -p storage/app/public/livewire-tmp",
    "mkdir -p storage/app/private/livewire-tmp",
    "mkdir -p storage/app/livewire-tmp",
    "mkdir -p bootstrap/cache",
    "chmod -R 777 storage bootstrap/cache",
    "npm run build"
]

[start]
cmd = "mkdir -p storage/app/public && chmod -R 777 storage/app/public && rm -rf public/storage && php artisan migrate --force && php artisan storage:link --force && php artisan serve --host 0.0.0.0 --port $PORT"
